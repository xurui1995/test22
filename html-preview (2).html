<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型市场趋势深度洞察</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #121212;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 100px;
        }

        /* 1. Advanced Background Textures */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
        
        /* Scanline Overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.2) 3px,
                rgba(0, 0, 0, 0.2) 4px
            );
            z-index: 1;
            pointer-events: none;
        }

        /* 2. Decorative HUD Elements */
        .hud-ring {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 800px;
            height: 800px;
            border: 1px solid rgba(124, 77, 255, 0.2);
            border-radius: 50%;
            z-index: 0;
        }
        .hud-ring::before {
            content: '';
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            bottom: 50px;
            border: 1px dashed rgba(0, 229, 255, 0.15);
            border-radius: 50%;
        }

        /* Glowing Accent Graphic (Retained & Enhanced) */
        .glow-graphic {
            position: absolute;
            top: 40%;
            right: -200px;
            transform: translateY(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.12) 0%, rgba(0, 229, 255, 0.03) 50%, transparent 70%);
            z-index: 1;
            filter: blur(60px);
        }

        /* 3. Main Content Styling */
        .content-wrapper {
            position: relative;
            z-index: 2;
            max-width: 960px;
        }

        .tag-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .tag-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #00E5FF;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00E5FF;
            padding: 6px 12px;
            letter-spacing: 1px;
        }
        
        .tag-line {
            height: 1px;
            width: 60px;
            background: #00E5FF;
            opacity: 0.5;
        }

        h1 {
            font-size: 92px;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 24px;
            color: #FFFFFF;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            /* Gradient Text */
            background: linear-gradient(135deg, #FFFFFF 40%, #B0BEC5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }
        
        .subtitle-bar {
            width: 4px;
            height: 50px;
            background: linear-gradient(to bottom, #7C4DFF, #00E5FF);
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            color: #E0E0E0;
            font-weight: 400;
            line-height: 1.5;
        }
        .subtitle span {
            color: #7C4DFF;
            font-weight: 700;
        }

        /* 4. Footer & Metadata */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #333;
            padding-top: 20px;
            width: 100%;
        }
        
        .footer-left strong { color: #FFF; margin-right: 10px; }
        .footer-right { color: #00E5FF; }

        /* 5. Spectrum Data Bars (Enhanced) */
        .spectrum-bars {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            opacity: 0.8;
        }
        .s-bar {
            flex: 1;
            background: #222;
            height: 4px; /* Default height */
        }
        /* Random heights for visual rhythm */
        .s-bar:nth-child(odd) { height: 8px; background: #333; }
        .s-bar:nth-child(3n) { height: 12px; background: #7C4DFF; opacity: 0.6; }
        .s-bar:nth-child(7n) { height: 12px; background: #00E5FF; box-shadow: 0 0 8px #00E5FF; opacity: 1; }
        .s-bar:nth-child(5n) { height: 6px; background: #555; }

    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Background Layers -->
        <div class="grid-bg"></div>
        <div class="scanlines"></div>
        <div class="hud-ring"></div>
        <div class="glow-graphic"></div>
        
        <!-- Main Content -->
        <div class="content-wrapper">
            <div class="tag-container">
                <div class="tag-box">2026 STRATEGIC REPORT</div>
                <div class="tag-line"></div>
                <div style="font-family:'JetBrains Mono'; font-size:14px; color:#666;">CONFIDENTIAL</div>
            </div>

            <h1>大模型市场趋势<br>深度洞察</h1>
            
            <div class="subtitle-wrapper">
                <div class="subtitle-bar"></div>
                <div class="subtitle">
                    技术变革 <span>//</span> 竞争格局 <span>//</span> 产业未来<br>
                    <span style="font-size:16px; color:#888;">AI MARKET TRENDS & INSIGHTS (2025-2030)</span>
                </div>
            </div>
            
            <div class="footer-info">
                <div class="footer-left">
                    <strong>PRESENTED BY</strong> MANUS INTELLIGENCE
                </div>
                <div class="footer-right">
                    FEB 27, 2026
                </div>
            </div>
        </div>

        <!-- Decorative Spectrum Bars -->
        <div class="spectrum-bars">
            <!-- Generating a rhythmic pattern manually for visual effect -->
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
            <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
        </div>
    </div>
</body>
</html>
